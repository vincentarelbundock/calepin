# -- Site identity --
output = "output"
target = "website"
csl = "chicago-author-date"
title = "Calepin"
subtitle = "A notebook and website generator written in Rust"
url = "https://vincentarelbundock.github.io/calepin"
favicon = "assets/Calepin.svg"

# -- Syntax highlighting --
[highlight]
light = "github"
dark = "nord"

# -- Navbar --

[[navbar.left]]
image = "assets/Calepin.svg"
image_dark = "assets/Calepin_dark.svg"
href = "/index.html"
text = "Calepin"

[[navbar.right]]
icon = "github"
href = "https://github.com/vincentarelbundock/calepin"

# -- Sidebar --

[[contents]]
pages = ["installation.qmd", "cli.qmd"]

[[contents]]
title = "Authoring"
pages = [
  "authoring/basics.qmd",
  "authoring/figures.qmd",
  "authoring/tables.qmd",
  "authoring/math.qmd",
  "authoring/bibliography.qmd",
  "authoring/paths.qmd",
]

[[contents]]
title = "Code Execution"
pages = [
  "code/chunks.qmd",
  "code/inline.qmd",
  "code/r.qmd",
  "code/python.qmd",
  "code/sh.qmd",
  "code/cache.qmd",
]

[[contents]]
title = "Collections"
pages = ["collections/toml.qmd", "collections/structure.qmd", "collections/serve.qmd"]

[[contents]]
title = "Templates"
pages = [
  "templates/templates.qmd",
  "templates/shortcuts.qmd",
  "templates/snippets.qmd",
  "templates/themes.qmd",
  "templates/yaml.qmd",
  "templates/sites.qmd",
]

[[contents]]
title = "Misc"
pages = ["misc/*.qmd"]

[[contents]]
standalone = true
pages = ["index.qmd", "404.qmd"]

# -- Post-processing --
[[post]]
command = "pagefind --site {output}"

# -- Template variables --
[var]
sidebar_collapse_level = 0

# -- Targets --

[targets.website]
engine = "html"
template = "page"
extension = "html"
fig_extension = "svg"
embed_resources = false
preview = "serve"

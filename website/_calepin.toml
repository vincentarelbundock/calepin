output = "output"

[meta]
title = "Calepin"
subtitle = "A notebook and website generator written in Rust"
url = "https://vincentarelbundock.github.io/calepin"
csl = "chicago-author-date"
highlight = {light = "github", dark = "nord"}

[site]
target = "website"
favicon = "assets/Calepin.svg"
logo = "assets/Calepin.svg"
logo-dark = "assets/Calepin_dark.svg"
content = [
  "installation.qmd",
  "cli.qmd",
  ["Authoring",
    "authoring/basics.qmd",
    "authoring/figures.qmd",
    "authoring/tables.qmd",
    "authoring/math.qmd",
    "authoring/bibliography.qmd",
    "authoring/paths.qmd",
  ],
  ["Code Execution",
    "code/chunks.qmd",
    "code/inline.qmd",
    "code/r.qmd",
    "code/python.qmd",
    "code/sh.qmd",
    "code/cache.qmd",
  ],
  ["Websites", "websites/*.qmd"],
  ["Templates",
    "templates/templates.qmd",
    "templates/jinja.qmd",
    "templates/shortcuts.qmd",
    "templates/snippets.qmd",
    "templates/elements.qmd",
    "templates/pages.qmd",
    "templates/sites.qmd",
    "templates/yaml.qmd",
  ],
  ["Misc", "misc/*.qmd"],
]
content_standalone = [
  "index.qmd",
  "404.qmd",
]

[var]
primary = "#0066cc"
background = "#ffffff"
background_dark = "#1a1a2e"
foreground = "#222222"
foreground_dark = "#e0e0e0"
font = "Inter"
font_headings = "Inter"
font_mono = "JetBrains Mono"
navbar_background = "#fafafa"
navbar_search = true
sidebar_collapse_level = 0

[[var.navbar_right]]
icon = "github"
href = "https://github.com/vincentarelbundock/calepin"

[targets.latex]
base = "latex"
template = "calepin"
extension = "tex"
fig-extension = "pdf"
preview = "serve"
[targets.latex.compile]
command = "tectonic {input}"
extension = "pdf"

[targets.typst]
base = "typst"
template = "calepin"
extension = "typ"
fig-extension = "svg"
preview = "serve"
[targets.typst.compile]
extension = "pdf"

[targets.markdown]
base = "markdown"
template = "calepin"
extension = "md"
fig-extension = "png"
preview = "none"


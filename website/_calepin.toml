output = "output"
target = "website"
csl = "chicago-author-date"

[identity]
title = "Calepin"
subtitle = "A notebook and website generator written in Rust"
url = "https://vincentarelbundock.github.io/calepin"
favicon = "assets/Calepin.svg"
logo = "assets/Calepin.svg"
logo_dark = "assets/Calepin_dark.svg"

[highlight]
light = "github"
dark = "nord"

[[contents]]
pages = ["installation.qmd", "cli.qmd"]

[[contents]]
title = "Authoring"
pages = [
  "authoring/basics.qmd",
  "authoring/figures.qmd",
  "authoring/tables.qmd",
  "authoring/math.qmd",
  "authoring/bibliography.qmd",
  "authoring/paths.qmd",
]

[[contents]]
title = "Code Execution"
pages = [
  "code/chunks.qmd",
  "code/inline.qmd",
  "code/r.qmd",
  "code/python.qmd",
  "code/sh.qmd",
  "code/cache.qmd",
]

[[contents]]
title = "Collections"
pages = ["collections/toml.qmd", "collections/structure.qmd", "collections/serve.qmd"]

[[contents]]
title = "Templates"
pages = [
  "templates/templates.qmd",
  "templates/shortcuts.qmd",
  "templates/snippets.qmd",
  "templates/themes.qmd",
  "templates/yaml.qmd",
  "templates/sites.qmd",
]

[[contents]]
title = "Misc"
pages = ["misc/*.qmd"]

[[contents]]
standalone = true
pages = ["index.qmd", "404.qmd"]

[[post]]
command = "pagefind --site {output}"

[var]
primary = "#0066cc"
background = "#ffffff"
background_dark = "#1a1a2e"
foreground = "#222222"
foreground_dark = "#e0e0e0"
font = "Inter"
font_headings = "Inter"
font_mono = "JetBrains Mono"
navbar_background = "#fafafa"
navbar_search = true
sidebar_collapse_level = 0

[[var.navbar_right]]
icon = "github"
href = "https://github.com/vincentarelbundock/calepin"

[targets.latex]
engine ="latex"
template = "calepin"
extension = "tex"
fig_extension = "pdf"
preview = "serve"
[targets.latex.compile]
command = "tectonic {input}"
extension = "pdf"

[targets.typst]
engine ="typst"
template = "calepin"
extension = "typ"
fig_extension = "svg"
preview = "serve"
[targets.typst.compile]
extension = "pdf"

[targets.markdown]
engine ="markdown"
template = "calepin"
extension = "md"
fig_extension = "png"
preview = "none"

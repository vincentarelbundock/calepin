project:
  type: website
  resources:
    - assets

website:
  title: "Calepin"
  subtitle: "A notebook, website, and documentation generator written in Rust"
  site-url: https://calepin.io
  favicon: assets/Calepin.svg

  navbar:
    background: "#fafafa"
    search: true
    logo: assets/Calepin.svg
    logo-dark: assets/Calepin_dark.svg
    logo-alt: "Calepin logo"
    right:
      - icon: github
        href: https://github.com/vincentarelbundock/calepin

  sidebar:
    collapse-level: 0

  pages:
    - text: "Home"
      href: index.qmd
    - installation.qmd
    - cli.qmd
    - section: "Authoring"
      pages:
        - authoring/basics.qmd
        - authoring/figures.qmd
        - authoring/tables.qmd
        - authoring/math.qmd
        - authoring/bibliography.qmd
        - authoring/paths.qmd
    - section: "Code Execution"
      pages:
        - code/chunks.qmd
        - code/inline.qmd
        - code/r.qmd
        - code/python.qmd
        - code/sh.qmd
        - code/cache.qmd
    - section: "Websites"
      pages:
        - websites/structure.qmd
        - websites/serve.qmd
    - section: "Templates"
      pages:
        - templates/templates.qmd
        - templates/jinja.qmd
        - templates/shortcuts.qmd
        - templates/elements.qmd
        - templates/pages.qmd
        - templates/sites.qmd
        - templates/yaml.qmd
    - section: "Misc"
      pages:
        - text: "PDF Example"
          href: assets/pdf.pdf
        - misc/quarto.qmd

brand:
  color:
    palette:
      dark-grey: "#222222"
      blue: "#ddeaf1"
    background:
      light: "#ffffff"
      dark: "#1a1a2e"
    foreground:
      light: "#222222"
      dark: "#e0e0e0"
    primary: "#0066cc"
  logo:
    images:
      calepin:
        path: assets/Calepin.svg
        alt: "Calepin logo"
      calepin-dark:
        path: assets/Calepin_dark.svg
        alt: "Calepin logo"
    medium:
      light: calepin
      dark: calepin-dark
  typography:
    fonts:
      - family: Inter
        source: google
      - family: JetBrains Mono
        source: google
    base: Inter
    headings: Inter
    monospace: JetBrains Mono
  meta:
    name: Calepin
    link: https://github.com/vincentarelbundock/calepin

execute:
  cache: false

format:
  html:
    toc: true
    highlight-style:
      light: github
      dark: nord
    code-copy: true
    code-overflow: scroll

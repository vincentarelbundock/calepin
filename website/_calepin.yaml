project:
  type: website
  resources:
    - assets

website:
  title: "Calepin"
  subtitle: "A fast rendering engine for Quarto, written in Rust"
  site-url: https://calepin.io
  favicon: assets/Calepin.svg

  navbar:
    background: "#fafafa"
    search: true
    logo: assets/Calepin.svg
    logo-dark: assets/Calepin_dark.svg
    logo-alt: "Calepin logo"
    right:
      - icon: github
        href: https://github.com/vincentarelbundock/calepin

  sidebar:
    collapse-level: 0

  pages:
    - text: "Home"
      href: index.qmd
    - installation.qmd
    - cli.qmd
    - section: "Authoring"
      pages:
        - basics.qmd
        - figures.qmd
        - tables.qmd
        - math.qmd
        - bibliography.qmd
    - section: "Code Execution"
      pages:
        - code/chunks.qmd
        - code/inline.qmd
        - code/r.qmd
        - code/python.qmd
        - code/sh.qmd
        - cache.qmd
    - section: "Extending"
      pages:
        - plugins.qmd
        - shortcodes.qmd
        - filters.qmd
        - templates.qmd
    - section: "Misc"
      pages:
        - text: "PDF Example"
          href: assets/pdf.pdf
        - slides.qmd
        - quarto.qmd

execute:
  cache: false

format:
  html:
    toc: true
    highlight-style:
      light: github
      dark: nord
    code-copy: true
    code-overflow: scroll

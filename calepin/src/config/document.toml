# Document-level defaults (single-file rendering).
# Concatenated with shared.toml at load time.

# -- Document targets --
[targets.html]
engine = "html"
template = "page"
extension = "html"
fig_extension = "svg"
preview = "serve"

[targets.latex]
engine = "latex"
template = "page"
extension = "tex"
fig_extension = "pdf"
preview = "serve"

[targets.typst]
engine = "typst"
template = "page"
extension = "typ"
fig_extension = "svg"
preview = "serve"

[targets.pdf]
engine = "latex"
template = "page"
extension = "pdf"
fig_extension = "pdf"
compile = "tectonic {input}"

[targets.revealjs]
engine = "revealjs"
template = "page"
extension = "html"
fig_extension = "svg"
embed_resources = false
preview = "serve"

[targets.markdown]
engine = "markdown"
template = "page"
extension = "md"
fig_extension = "png"
preview = "none"

# Document-level defaults (single-file rendering).
# Concatenated with shared.toml at load time.

# -- Document targets --
[targets.html]
engine = "html"
template = "page"
extension = "html"
fig_extension = "svg"
fig_formats = ["svg", "png", "jpg", "webp", "gif"]
preview = "serve"
modules = ["highlight", "append_footnotes_html", "embed_images_html"]
crossref = "html"

[targets.latex]
engine = "latex"
template = "page"
extension = "tex"
fig_extension = "pdf"
fig_formats = ["pdf", "eps", "svg", "png", "jpg"]
preview = "serve"
modules = ["highlight", "convert_svg_pdf", "inject_color_defs_latex"]
crossref = "latex"
toc_headings = false

[targets.typst]
engine = "typst"
template = "page"
extension = "typ"
fig_extension = "svg"
fig_formats = ["svg", "png", "jpg"]
preview = "serve"
modules = ["highlight"]
crossref = "plain"

[targets.pdf]
engine = "latex"
template = "page"
extension = "pdf"
fig_extension = "pdf"
compile = "tectonic {input}"
modules = ["highlight", "convert_svg_pdf", "inject_color_defs_latex"]
crossref = "latex"
toc_headings = false

[targets.revealjs]
engine = "html"
template = "page"
extension = "html"
fig_extension = "svg"
embed_resources = false
preview = "serve"
modules = ["highlight", "append_footnotes_html", "split_slides_html"]
crossref = "html"
toc_headings = false

[targets.revealjs.page_vars]
base = "html"

[targets.markdown]
engine = "markdown"
extension = "md"
fig_extension = "png"
preview = "none"
modules = ["highlight"]
crossref = "plain"

[targets.word]
engine = "markdown"
extension = "docx"
fig_extension = "png"
modules = ["highlight"]
crossref = "plain"
writer = "pandoc"

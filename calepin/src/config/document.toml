# Document-level defaults (single-file rendering).
# Concatenated with shared.toml at load time.

title = "Calepin"
subtitle = "A document and site generator"
authors = ["Vincent Arel-Bundock"]

# -- Document targets --
[targets.html]
engine = "html"
template = "page"
extension = "html"
fig_extension = "svg"
preview = "serve"

[targets.latex]
engine = "latex"
template = "page"
extension = "tex"
fig_extension = "pdf"
preview = "serve"
[targets.latex.compile]
command = "tectonic {input}"
extension = "pdf"

[targets.typst]
engine = "typst"
template = "page"
extension = "typ"
fig_extension = "svg"
preview = "serve"
[targets.typst.compile]
extension = "pdf"

[targets.pdf]
engine = "latex"
template = "page"
extension = "tex"
fig_extension = "pdf"
[targets.pdf.compile]
command = "tectonic {input}"
extension = "pdf"

[targets.revealjs]
engine = "revealjs"
template = "page"
extension = "html"
fig_extension = "svg"
embed_resources = false
preview = "serve"

[targets.markdown]
engine = "markdown"
template = "page"
extension = "md"
fig_extension = "png"
preview = "none"

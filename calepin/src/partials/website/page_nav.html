{% if document.prev or document.next %}
<nav class="page-nav" aria-label="Page navigation">
  {% if document.prev %}
  <a href="{{ document.prev.href }}" class="prev">
    {{ icon(name="arrow-left") }}
    <span>
      <span class="label">Previous</span><br>
      {{ document.prev.text }}
    </span>
  </a>
  {% endif %}
  {% if document.next %}
  <a href="{{ document.next.href }}" class="next">
    <span>
      <span class="label">Next</span><br>
      {{ document.next.text }}
    </span>
    {{ icon(name="arrow-right") }}
  </a>
  {% endif %}
</nav>
{% endif %}

<div class="search-overlay" role="dialog" aria-label="Search">
  <div class="search-modal">
    <div class="search-input-wrap">
      {{ icon(name="search") }}
      <input class="search-input" type="text" placeholder="Search..." aria-label="Search">
      <span class="search-kbd">Esc</span>
    </div>
    <div class="search-results">
      <div class="search-hint">Start typing to search... <span class="search-kbd">Ctrl</span>+<span class="search-kbd">K</span></div>
    </div>
  </div>
</div>

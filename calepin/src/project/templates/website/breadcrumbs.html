{% if page.breadcrumbs | length > 2 %}
<nav class="breadcrumbs" aria-label="Breadcrumbs">
  {% for crumb in page.breadcrumbs %}
  {% if not loop.last %}
    {% if crumb.href %}<a href="{{ crumb.href }}">{{ crumb.text }}</a>{% else %}<span>{{ crumb.text }}</span>{% endif %}
    <span class="separator">/</span>
  {% else %}
    <span aria-current="page">{{ crumb.text }}</span>
  {% endif %}
  {% endfor %}
</nav>
{% endif %}

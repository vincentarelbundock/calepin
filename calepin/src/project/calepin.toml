# Built-in defaults for calepin.
# All fields here can be overridden in _calepin.toml or front matter.

# -- Identity --
title = "Calepin"
subtitle = "A document and site generator"
author = "Vincent Arel-Bundock"

# -- Rendering --
format = "html"
lang = "en"
preview_port = 3456
csl = "chicago-author-date"
dpi = 150.0
math = "katex"
embed_resources = true
global_crossref = false

# -- Highlight --
[highlight]
light = "github"
dark = "nord"

# -- Table of contents --
[toc]
enabled = false
depth = 3
title = "Contents"

# -- Labels --
[labels]
abstract_title = "Abstract"
keywords = "Keywords"
appendix = "Appendix"
citation = "Citation"
reuse = "Reuse"
funding = "Funding"
copyright = "Copyright"
listing = "Listing"
proof = "Proof"
contents = "Contents"

# -- Code execution --
[execute]
cache = true
eval = true
echo = true
include = true
warning = true
message = true
comment = "> "
results = "markup"

# -- Figure defaults --
[figure]
width = 6.0
out_width = 0.70
aspect_ratio = 0.618
device = "png"
alignment = "center"

# -- Callout defaults --
[callout]
appearance = "default"
note = "Note"
tip = "Tip"
warning = "Warning"
important = "Important"
caution = "Caution"
icon_note = "\u2139\uFE0F"
icon_tip = "\U0001F4A1"
icon_warning = "\u26A0\uFE0F"
icon_important = "\u2757"
icon_caution = "\U0001F525"

# -- Layout defaults --
[layout]
valign = "top"
columns = 1
rows = 1

# -- Shortcode defaults --
[video]
width = "100%"
height = "400"
title = "Video"

[placeholder]
width = 600
height = 400
color = "#cccccc"

[lipsum]
paragraphs = 1

# -- Format-specific defaults --
[latex]
documentclass = "article"
fontsize = "11pt"
linkcolor = "black"
urlcolor = "blue!60!black"
citecolor = "blue!60!black"

[typst]
fontsize = "11pt"
leading = "0.65em"
justify = true
heading_numbering = "1.1"

[revealjs]
theme = "white"
code_theme = "monokai"
transition = "slide"
slide_number = true

# -- Targets --
[targets.html]
engine = "html"
template = "page"
extension = "html"
fig_extension = "svg"
preview = "serve"

[targets.latex]
engine = "latex"
template = "page"
extension = "tex"
fig_extension = "pdf"
preview = "serve"
[targets.latex.compile]
command = "tectonic {input}"
extension = "pdf"

[targets.typst]
engine = "typst"
template = "page"
extension = "typ"
fig_extension = "svg"
preview = "serve"
[targets.typst.compile]
extension = "pdf"

[targets.website]
engine = "html"
template = "page"
extension = "html"
fig_extension = "svg"
embed_resources = false
preview = "serve"

[targets.book]
engine = "latex"
template = "page"
extension = "tex"
fig_extension = "pdf"
[targets.book.compile]
command = "tectonic {input}"
extension = "pdf"

[targets.pdf]
engine = "latex"
template = "page"
extension = "tex"
fig_extension = "pdf"
[targets.pdf.compile]
command = "tectonic {input}"
extension = "pdf"

[targets.revealjs]
engine = "revealjs"
template = "page"
extension = "html"
fig_extension = "svg"
embed_resources = false
preview = "serve"

[targets.markdown]
engine = "markdown"
template = "page"
extension = "md"
fig_extension = "png"
preview = "none"

[defaults]
format = "html"
preview_port = 3456
csl = "chicago-author-date"
dpi = 150.0
math = "katex"
embed_resources = true

[defaults.highlight]
light = "github"
dark = "nord"

[defaults.figure]
width = 6.0
out_width = 0.70
aspect_ratio = 0.618
device = "png"
alignment = "center"

[defaults.chunk]
cache = true
eval = true
echo = true
include = true
warning = true
message = true
comment = "> "
results = "markup"

[defaults.toc]
depth = 3
title = "Contents"

[defaults.callout]
appearance = "default"
note = "Note"
tip = "Tip"
warning = "Warning"
important = "Important"
caution = "Caution"

[defaults.video]
width = "100%"
height = "400"
title = "Video"

[defaults.placeholder]
width = 600
height = 400
color = "#cccccc"

[defaults.lipsum]
paragraphs = 1

[defaults.layout]
valign = "top"
columns = 1
rows = 1

global_crossref = false

title = "Calepin"
subtitle = "A document and site generator"
author = "Vincent Arel-Bundock"
csl = "chicago-author-date"
highlight = {light = "github", dark = "nord"}

[targets.html]
engine = "html"
template = "page"
extension = "html"
fig_extension = "svg"
preview = "serve"

[targets.latex]
engine = "latex"
template = "page"
extension = "tex"
fig_extension = "pdf"
preview = "serve"
[targets.latex.compile]
command = "tectonic {input}"
extension = "pdf"

[targets.typst]
engine = "typst"
template = "page"
extension = "typ"
fig_extension = "svg"
preview = "serve"
[targets.typst.compile]
extension = "pdf"

[targets.website]
engine = "html"
template = "page"
extension = "html"
fig_extension = "svg"
embed_resources = false
preview = "serve"

[targets.book]
engine = "latex"
template = "page"
extension = "tex"
fig_extension = "pdf"
[targets.book.compile]
command = "tectonic {input}"
extension = "pdf"

[targets.pdf]
engine = "latex"
template = "page"
extension = "tex"
fig_extension = "pdf"
[targets.pdf.compile]
command = "tectonic {input}"
extension = "pdf"

[targets.revealjs]
engine = "revealjs"
template = "page"
extension = "html"
fig_extension = "svg"
embed_resources = false
preview = "serve"

[targets.markdown]
engine = "markdown"
template = "page"
extension = "md"
fig_extension = "png"
preview = "none"

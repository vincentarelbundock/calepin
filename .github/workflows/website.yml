name: Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install calepin
        run: make install

      - name: Install R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: Rscript -e 'install.packages(c("ggplot2", "tinytable"), repos = "https://cloud.r-project.org")'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python packages
        run: uv pip install --system numpy matplotlib pandas

      - name: Install pagefind
        run: npx pagefind --version

      - name: Build website
        run: cd website && uv run calepin render _calepin/config.toml

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/_calepin_output
          force_orphan: true

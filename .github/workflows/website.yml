name: Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            calepin/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build calepin
        run: cargo build --release --manifest-path calepin/Cargo.toml

      - name: Install calepin
        run: cp calepin/target/release/calepin /usr/local/bin/

      - name: Install R
        uses: r-lib/actions/setup-r@v2

      - name: Install R packages
        run: Rscript -e 'install.packages(c("ggplot2", "tinytable"), repos = "https://cloud.r-project.org")'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python packages
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install numpy matplotlib pandas

      - name: Install pagefind
        run: npx pagefind --version

      - name: Build website
        run: |
          source .venv/bin/activate
          cd website && calepin render _calepin/config.toml

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/_calepin_output
          force_orphan: true
